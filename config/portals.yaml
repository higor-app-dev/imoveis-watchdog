# config/portals.yaml — Registro central de portais
#
# Para adicionar um novo portal:
#   1. Adicione uma entrada neste arquivo
#   2. Crie o módulo parser em skills/<portal>/
#   3. O discovery carrega automaticamente
#
# Campos:
#   name          — valor usado em Imovel.fonte (ex.: "quintoandar", "loft")
#   display_name  — nome amigável para telas/logs (ex.: "QuintoAndar")
#   parser_module — caminho do módulo Python relativo à raiz do projeto
#   base_url      — URL base do portal
#   enabled       — true = ativo no watchdog, false = ignorado
#   auth          — opcional: chaves/headers de autenticação
#   functions     — mapeamento das funções do parser:
#     parse_listing : (dict) -> Imovel        — converte uma listagem individual
#     parse_payload : (dict) -> list[Imovel]  — converte payload de busca completa
#     build_url     : (dict) -> str           — constrói URL de busca

portals:
  quinto_andar:
    name: "quintoandar"
    display_name: "QuintoAndar"
    parser_module: "skills.quinto_andar.quintoandar_parser"
    base_url: "https://www.quintoandar.com.br"
    enabled: true
    auth: {}
    functions:
      parse_listing: "from_quintoandar_listing"
      parse_payload: "from_quintoandar_payload"

  loft:
    name: "loft"
    display_name: "Loft"
    parser_module: "skills.loft.loft_parser"
    base_url: "https://www.loft.com.br"
    enabled: true
    auth: {}
    functions:
      parse_listing: "from_loft_listing"
      parse_payload: "from_loft_payload"
      extract_ssr: "extract_ssr"

  emcasa:
    name: "emcasa"
    display_name: "EmCasa"
